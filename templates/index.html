<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحويل الاكسل إلى جهات اتصال</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>

html, body {
    margin: 0;
    padding: 0;
    font-family: sans-serif;
    background: #f2f2f7;
    height: 100%;
}

/* Container */
.container {
    width: 100%;
    max-width: 480px;
    margin: auto;
    padding: 20px;
}

/* Title */
.container h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 600;
    font-size: 22px;
}

/* Card-style form */
form {
    background: #ffffff;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
}
    form > *:not(:last-child) {
        margin-bottom: 12px;
    }
/* Inputs / selects / buttons */
input,
select,
button {
    width: 90%;
    box-sizing: border-box;
    padding: 14px;
    font-size: 16px;
    border-radius: 12px;
    border: 2px solid #ddd;
    background: #f9f9fb;
    transition: all 0.2s ease;
}

/* Focus effect */
input:focus,
select:focus {
    outline: none;
    border-color: #4CAF50;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(76,175,80,0.15);
}

/* Button */
button {
    background: linear-gradient(135deg, #4CAF50, #43a047);
    color: white;
    border: none;
    font-weight: 600;
    cursor: pointer;
}

button:active {
    transform: scale(0.98);
}

/* Drop zone */
.drop-zone {
    border: 2px dashed #ccc;
    border-radius: 16px;
    padding: 25px;
    text-align: center;
    background: #fafafa;
    transition: 0.3s;
}

.drop-zone.dragover {
    border-color: #4CAF50;
    background: #e8f5e9;
}

/* Progress bar */
#progress-container {
    width: 100%;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    display: none;
}

#progress-bar {
    height: 20px;
    width: 0%;
    background: linear-gradient(90deg, #4CAF50, #66bb6a);
    text-align: center;
    color: white;
    font-size: 12px;
    line-height: 20px;
}

/* Smooth appearance animation */
form {
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

        @media (max-width: 480px) {
            form {
                padding: 15px;
            }
            
        }
    </style>
</head>
<body>
<div class="container">
    <h2>📱 تحويل ملفات الاكسل إلى جهات اتصال</h2>

    <form id="upload-form" action="/upload" method="post" enctype="multipart/form-data">

   <div class="drop-zone" id="drop-zone">
    <span id="drop-zone-text">اسحب وافلت ملف الاكسل هنا<br>أو اضغط لاختياره</span>
</div>
<input type="file" name="file" id="file-input" style="display:none;" required>

        <label>هل ترغب بتحديد الأعمدة بشكل يدوي؟</label>
<select name="manual" id="manual_select">
    <option value="no" selected>لا</option>
    <option value="yes">نعم</option>
</select>

<div id="manual-fields" style="display:none;">
    <input type="text" name="name_col" placeholder="اكتب عنوان عمود الاسم">
    <input type="text" name="mobile_col" placeholder="اكتب عنوان عمود رقم الجوال">
    <input type="text" name="city_col" placeholder="اكتب عنوان عمود المدينة">
</div>

<label>هل ترغب بالتصفية حسب الجنس؟</label>
<select name="gender_filter" id="gender_filter">
    <option value="no" selected>لا</option>
    <option value="yes">نعم</option>
</select>

<select name="gender" id="gender_select" style="display:none;">
    <option value="male">ذكر</option>
    <option value="female">أنثى</option>
</select>

        <button type="submit">تحويل</button>

        <div id="progress-container">
            <div id="progress-bar">0%</div>
        </div>
    </form>
</div>


<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const dropZoneText = document.getElementById('drop-zone-text');
const form = document.getElementById('upload-form');
const progressContainer = document.getElementById('progress-container');
const progressBar = document.getElementById('progress-bar');
const genderFilter = document.getElementById('gender_filter');
const genderSelect = document.getElementById('gender_select');
const manualSelect = document.getElementById('manual_select');
const manualFields = document.getElementById('manual-fields');

// Toggle visibility
manualSelect.addEventListener('change', () => {
    if(manualSelect.value === 'yes'){
        manualFields.style.display = 'block';
    } else {
        manualFields.style.display = 'none';
    }
});
    genderSelect.style.display = 'none'; // hidden by default

// Show/hide gender select based on filter choice
genderFilter.addEventListener('change', () => {
    if(genderFilter.value === 'yes'){
        genderSelect.style.display = 'block';
    } else {
        genderSelect.style.display = 'none';
    }
});

// Drag & Drop
dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    fileInput.files = e.dataTransfer.files;
    if(fileInput.files.length > 0){
        dropZoneText.textContent =  fileInput.files[0].name;
    }
});

// Show selected file when using file input
fileInput.addEventListener('change', () => {
    if(fileInput.files.length > 0){
        dropZoneText.textContent =  fileInput.files[0].name;
    } else {
        dropZoneText.textContent = "اسحب وافلت ملف اكسل هنا\nأو اضغط لاختياره";
    }
});

// Submit with AJAX
form.addEventListener('submit', function(e){
    e.preventDefault();

    if(fileInput.files.length === 0) return;

    const formData = new FormData(form);
    const originalFileName = fileInput.files[0].name;
    const vcfFileName = originalFileName.replace(/\.[^/.]+$/, ".vcf");

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/upload', true);

    xhr.upload.addEventListener('progress', function(e){
        if(e.lengthComputable){
            const percent = Math.round((e.loaded / e.total) * 100);
            progressContainer.style.display = 'block';
            progressBar.style.width = percent + '%';
            progressBar.textContent = percent + '%';
        }
    });
window.addEventListener('DOMContentLoaded', () => {
    manualFields.style.display = manualSelect.value === 'yes' ? 'block' : 'none';
});
    xhr.onload = function(){
        if(xhr.status === 200){
            const blob = new Blob([xhr.response], {type: "application/octet-stream"});
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = vcfFileName;
            link.click();
            progressBar.textContent = "✅ تم التحويل!";
        } else {
            progressBar.textContent = "❌ حدث خطأ!";
        }
    };

    xhr.responseType = 'blob';
    xhr.send(formData);
});
</script>
</body>
</html>
